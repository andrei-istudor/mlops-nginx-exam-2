# nginx/nginx.conf# This block contains the directives that configure how Nginx handles connection events.
events {
    worker_connections 256; # Maximum number of connections per process
}

# This part is the main container for all HTTP (and HTTPS) protocol-related configurations. 
# This is where you define your virtual servers (server blocks).
http {
    limit_req_zone $binary_remote_addr zone=apilimit:10m rate=10r/s;

    # # Route to v2 only when X-Experiment-Group: debug is present.
    map $http_x_experiment_group $api_backend {
        default http://up-api-v1;
        ~*^debug$ http://up-api-v2;
    }


    # the upstream block defines a group of backend servers that Nginx can proxy requests to.
    upstream up-api-v1 {
        # Define API instances by their Docker Compose service name and internal port
        server api_v1:8000;
        # Optional -> Specify a strategy (default: Round Robin)
        #   least_conn; # For the Least Connections strategy
        #   ip_hash; # For IP Hash Strategy
    }

    upstream up-api-v2 {
        server api_v2:8000;
    }

    # Defining our virtual server
    # This block is a "virtual server" or "server block". 
    # It defines the configuration for a specific website or domain that Nginx should manage. 
    # You can have multiple server blocks within the http block.
    server {
        listen 80;
        server_name localhost; # Domain name or IP that this server block manages

        # Redirects all HTTP requests to HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl; # Listen on port 443 for HTTPS traffic
        server_name localhost; # Domain name or IP that this server block manages

        # SSL certificate and key configuration
        ssl_certificate /etc/nginx/ssl/nginx.crt; # Path to your SSL certificate
        ssl_certificate_key /etc/nginx/ssl/nginx.key; # Path to your SSL private key

        # SSL protocols and ciphers
        ssl_protocols TLSv1.2 TLSv1.3; # Only allow modern versions of TLS
        ssl_ciphers HIGH:!aNULL:!MD5; # List of allowed cipher suites
        ssl_prefer_server_ciphers on; # Prefer server ciphers

# All requests that start with /predict/ will be handled here
        location /predict {
            auth_basic "API Access Protected"; # Message displayed to the user
            auth_basic_user_file /etc/nginx/.htpasswd; # Path to the .htpasswd file in the container

            # Applies the limitation to the `location/predict` block
            limit_req zone=apilimit burst=5 nodelay;
            
            proxy_pass $api_backend;
            # proxy_pass: Redirects the request to the backend service
            # $api_backend is selected using the X-Experiment-Group header.
            # It defaults to up-api-v1 and switches to up-api-v2 for "debug".

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}